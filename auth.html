<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Daftar — FlixID</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Login atau daftar ke FlixID untuk menyimpan film favorit ke watchlist pribadi kamu.">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JDD9XZQWQ"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-6JDD9XZQWQ');</script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red: #E50914; --dark: #0f0f0f; --card: #1a1a1a;
      --text: #fff; --muted: #b3b3b3;
      --font-title: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    body { background: var(--dark); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; }

    /* NAV */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 48px; background: rgba(15,15,15,0.97); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo { font-family: var(--font-title); font-size: 2rem; letter-spacing: 2px; text-decoration: none; }
    .logo span:first-child { color: #fff; }
    .logo span:last-child { color: var(--red); }

    /* AUTH CONTAINER */
    .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: linear-gradient(135deg, #0a0a0a, #1a0505, #0a0a0a); position: relative; overflow: hidden; }
    .auth-glow { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(229,9,20,0.12) 0%, transparent 70%); top: -100px; left: 50%; transform: translateX(-50%); }

    /* AUTH BOX */
    .auth-box { background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 40px; width: 100%; max-width: 420px; position: relative; z-index: 2; }
    .auth-logo { text-align: center; margin-bottom: 8px; font-family: var(--font-title); font-size: 2.5rem; letter-spacing: 3px; }
    .auth-logo span:first-child { color: #fff; }
    .auth-logo span:last-child { color: var(--red); }
    .auth-subtitle { text-align: center; font-size: 14px; color: var(--muted); margin-bottom: 32px; }

    /* TABS */
    .auth-tabs { display: flex; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 4px; margin-bottom: 28px; }
    .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 6px; transition: all .2s; color: var(--muted); }
    .auth-tab.active { background: var(--red); color: #fff; }

    /* FORM */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 7px; color: rgba(255,255,255,0.7); }
    .form-group input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 14px; font-family: var(--font-body); transition: border-color .2s; }
    .form-group input:focus { outline: none; border-color: rgba(229,9,20,0.5); background: rgba(255,255,255,0.08); }
    .form-group input::placeholder { color: var(--muted); }
    .form-group input.error { border-color: rgba(229,9,20,0.8); }

    /* BUTTONS */
    .btn-submit { width: 100%; background: var(--red); color: #fff; border: none; padding: 13px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font-body); transition: background .2s, transform .1s; margin-bottom: 16px; }
    .btn-submit:hover { background: #f40612; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .divider span { font-size: 12px; color: var(--muted); }

    .btn-google { width: 100%; background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.15); padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font-body); transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
    .google-icon { width: 18px; height: 18px; }

    /* MESSAGES */
    .error-msg { background: rgba(229,9,20,0.1); border: 1px solid rgba(229,9,20,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #ff6b6b; margin-bottom: 16px; display: none; }
    .success-msg { background: rgba(3,192,74,0.1); border: 1px solid rgba(3,192,74,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #03c04a; margin-bottom: 16px; display: none; }
    .loading { display: none; text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 12px; }

    /* FORGOT PASSWORD */
    .forgot-link { text-align: right; margin-bottom: 18px; margin-top: -10px; }
    .forgot-link a { font-size: 12px; color: var(--red); text-decoration: none; cursor: pointer; }

    /* USER PROFILE (shown when logged in) */
    .user-profile { text-align: center; }
    .user-avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px; overflow: hidden; background: var(--red); display: flex; align-items: center; justify-content: center; font-family: var(--font-title); font-size: 2rem; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-family: var(--font-title); font-size: 1.8rem; letter-spacing: 1px; margin-bottom: 4px; }
    .user-email { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .user-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-num { font-family: var(--font-title); font-size: 2rem; color: var(--red); }
    .stat-label { font-size: 12px; color: var(--muted); }
    .btn-logout { width: 100%; background: rgba(229,9,20,0.1); color: var(--red); border: 1px solid rgba(229,9,20,0.3); padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font-body); transition: all .2s; margin-bottom: 12px; }
    .btn-logout:hover { background: rgba(229,9,20,0.2); }
    .btn-home { width: 100%; background: var(--red); color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font-body); text-decoration: none; display: block; text-align: center; transition: background .2s; }
    .btn-home:hover { background: #f40612; }

    footer { padding: 20px 48px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .footer-copy { font-size: 12px; color: rgba(255,255,255,0.2); }
    .footer-links { display: flex; gap: 16px; }
    .footer-links a { font-size: 12px; color: var(--muted); text-decoration: none; }

    @media(max-width:480px){ nav{padding:14px 20px} .auth-box{padding:28px 20px} footer{padding:16px 20px} }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><span>Flix</span><span>ID</span></a>
</nav>

<div class="auth-container">
  <div class="auth-glow"></div>

  <!-- LOGIN/REGISTER FORM (shown when logged out) -->
  <div class="auth-box" id="auth-form-box">
    <div class="auth-logo"><span>Flix</span><span>ID</span></div>
    <div class="auth-subtitle">Masuk untuk menyimpan film favoritmu</div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Masuk</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Daftar</div>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
    <div class="loading" id="loading">⏳ Memproses...</div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="email@kamu.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Password kamu">
      </div>
      <div class="forgot-link"><a onclick="showForgotPassword()">Lupa password?</a></div>
      <button class="btn-submit" onclick="loginWithEmail()">Masuk</button>
      <div class="divider"><span>atau</span></div>
      <button class="btn-google" onclick="loginWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Masuk dengan Google
      </button>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="reg-name" placeholder="Nama kamu">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="email@kamu.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Minimal 6 karakter">
      </div>
      <button class="btn-submit" onclick="registerWithEmail()">Buat Akun</button>
      <div class="divider"><span>atau</span></div>
      <button class="btn-google" onclick="loginWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Daftar dengan Google
      </button>
    </div>
  </div>

  <!-- USER PROFILE (shown when logged in) -->
  <div class="auth-box" id="user-profile-box" style="display:none">
    <div class="user-profile">
      <div class="user-avatar" id="user-avatar">U</div>
      <div class="user-name" id="user-name">Loading...</div>
      <div class="user-email" id="user-email"></div>
      <div class="user-stats">
        <div class="stat-card">
          <div class="stat-num" id="watchlist-count">0</div>
          <div class="stat-label">Watchlist</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="watched-count">0</div>
          <div class="stat-label">Sudah Ditonton</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Keluar dari Akun</button>
      <a href="index.html" class="btn-home">🎬 Kembali ke FlixID</a>
    </div>
  </div>
</div>

<footer>
  <div class="footer-copy">© 2024 FlixID</div>
  <div class="footer-links">
    <a href="index.html">Beranda</a>
    <a href="privacy.html">Privasi</a>
    <a href="contact.html">Kontak</a>
  </div>
</footer>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, updateProfile, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  // Firebase Config — GANTI DENGAN CONFIG KAMU
  const firebaseConfig = {
    apiKey: "AIzaSyAz5RCR0F71MtHnZ-daPLDzSxAmD2BhBYk",
    authDomain: "calm-history-468711-e6.firebaseapp.com",
    projectId: "calm-history-468711-e6",
    storageBucket: "calm-history-468711-e6.firebasestorage.app",
    messagingSenderId: "382975857631",
    appId: "1:382975857631:web:1fe6482ea61445ecc52a6a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  // Make functions global
  window.loginWithEmail = async () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if(!email || !password){ showError('Email dan password harus diisi!'); return; }
    showLoading(true);
    try {
      await signInWithEmailAndPassword(auth, email, password);
      showSuccess('Login berhasil! Mengarahkan...');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch(e) {
      showError(getErrorMessage(e.code));
    }
    showLoading(false);
  };

  window.registerWithEmail = async () => {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if(!name || !email || !password){ showError('Semua field harus diisi!'); return; }
    if(password.length < 6){ showError('Password minimal 6 karakter!'); return; }
    showLoading(true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, 'users', cred.user.uid), {
        name, email, createdAt: new Date().toISOString(),
        watchlist: [], watched: []
      });
      showSuccess('Akun berhasil dibuat! Mengarahkan...');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch(e) {
      showError(getErrorMessage(e.code));
    }
    showLoading(false);
  };

  window.loginWithGoogle = async () => {
    showLoading(true);
    try {
      const result = await signInWithPopup(auth, googleProvider);
      const user = result.user;
      // Save user to Firestore if new
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if(!userDoc.exists()){
        await setDoc(doc(db, 'users', user.uid), {
          name: user.displayName,
          email: user.email,
          photo: user.photoURL,
          createdAt: new Date().toISOString(),
          watchlist: [], watched: []
        });
      }
      showSuccess('Login berhasil! Mengarahkan...');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch(e) {
      if(e.code !== 'auth/popup-closed-by-user'){
        showError(getErrorMessage(e.code));
      }
    }
    showLoading(false);
  };

  window.logout = async () => {
    await signOut(auth);
    document.getElementById('user-profile-box').style.display = 'none';
    document.getElementById('auth-form-box').style.display = 'block';
  };

  window.showForgotPassword = async () => {
    const email = document.getElementById('login-email').value.trim();
    if(!email){ showError('Masukkan email kamu dulu di field email!'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showSuccess('Email reset password sudah dikirim! Cek inbox kamu.');
    } catch(e) {
      showError(getErrorMessage(e.code));
    }
  };

  // Auth state observer
  onAuthStateChanged(auth, async (user) => {
    if(user){
      document.getElementById('auth-form-box').style.display = 'none';
      document.getElementById('user-profile-box').style.display = 'block';
      document.getElementById('user-name').textContent = user.displayName || 'Pengguna FlixID';
      document.getElementById('user-email').textContent = user.email;
      // Avatar
      const avatarEl = document.getElementById('user-avatar');
      if(user.photoURL){
        avatarEl.innerHTML = `<img src="${user.photoURL}" alt="avatar">`;
      } else {
        avatarEl.textContent = (user.displayName || 'U')[0].toUpperCase();
      }
      // Load watchlist count from Firestore
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if(userDoc.exists()){
          const data = userDoc.data();
          document.getElementById('watchlist-count').textContent = (data.watchlist||[]).length;
          document.getElementById('watched-count').textContent = (data.watched||[]).length;
        }
      } catch(e) {}
    }
  });

  // Helpers
  function showError(msg){ const el=document.getElementById('error-msg'); el.textContent=msg; el.style.display='block'; document.getElementById('success-msg').style.display='none'; }
  function showSuccess(msg){ const el=document.getElementById('success-msg'); el.textContent=msg; el.style.display='block'; document.getElementById('error-msg').style.display='none'; }
  function showLoading(show){ document.getElementById('loading').style.display=show?'block':'none'; document.querySelectorAll('.btn-submit,.btn-google').forEach(b=>b.disabled=show); }

  function getErrorMessage(code){
    const msgs = {
      'auth/email-already-in-use': 'Email sudah terdaftar. Coba login!',
      'auth/invalid-email': 'Format email tidak valid.',
      'auth/weak-password': 'Password terlalu lemah. Minimal 6 karakter.',
      'auth/user-not-found': 'Email tidak ditemukan. Coba daftar dulu!',
      'auth/wrong-password': 'Password salah. Coba lagi!',
      'auth/too-many-requests': 'Terlalu banyak percobaan. Tunggu sebentar.',
      'auth/network-request-failed': 'Koneksi bermasalah. Cek internet kamu.',
      'auth/invalid-credential': 'Email atau password salah.',
    };
    return msgs[code] || 'Terjadi kesalahan. Coba lagi!';
  }
</script>

<script>
  // Tab switching
  function switchTab(tab){
    document.getElementById('tab-login').classList.toggle('active', tab==='login');
    document.getElementById('tab-register').classList.toggle('active', tab==='register');
    document.getElementById('login-form').style.display = tab==='login'?'block':'none';
    document.getElementById('register-form').style.display = tab==='register'?'block':'none';
    document.getElementById('error-msg').style.display='none';
    document.getElementById('success-msg').style.display='none';
  }
  // Enter key support
  document.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
      const activeTab = document.getElementById('tab-login').classList.contains('active');
      if(activeTab) window.loginWithEmail && window.loginWithEmail();
      else window.registerWithEmail && window.registerWithEmail();
    }
  });
</script>

</body>
</html>
